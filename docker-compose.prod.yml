services:
  web:
    image: ${ECR_REPO}:${IMAGE_TAG:-latest}
    container_name: stock-manager
    restart: unless-stopped
    env_file:
      - .env
    ports:
      - "80:8000"
    volumes:
      - watchlist-data:/home/app/stock-watchlist
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8000/api/health || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

volumes:
  watchlist-data:
