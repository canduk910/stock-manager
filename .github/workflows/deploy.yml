name: Deploy

on:
  push:
    branches: [main]

env:
  AWS_REGION: ap-northeast-2
  # REQ-OPS-07 (2026-05-09): CloudWatch Logs 통합 토글.
  # GitHub Actions Variables/Secrets 에 CLOUDWATCH_LOGS=true 설정 시 docker-compose.cloudwatch.yml 적용.
  # 사전 조건: terraform apply (infra/modules/compute) 로 aws_cloudwatch_log_group + IAM 정책 활성화 완료.
  CLOUDWATCH_LOGS: ${{ vars.CLOUDWATCH_LOGS || 'false' }}

jobs:
  ci:
    name: CI
    uses: ./.github/workflows/ci.yml

  deploy:
    name: Build & Deploy
    runs-on: ubuntu-latest
    needs: ci
    permissions:
      id-token: write
      contents: read

    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to ECR
        id: ecr-login
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build & Push Docker image
        env:
          ECR_REGISTRY: ${{ steps.ecr-login.outputs.registry }}
          ECR_REPO: ${{ steps.ecr-login.outputs.registry }}/stock-manager
          IMAGE_TAG: ${{ github.sha }}
        run: |
          docker build -t $ECR_REPO:$IMAGE_TAG -t $ECR_REPO:latest .
          docker push $ECR_REPO:$IMAGE_TAG
          docker push $ECR_REPO:latest

      - name: Ensure Backtester MCP
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.BACKTESTER_HOST }}
          username: ec2-user
          key: ${{ secrets.EC2_SSH_KEY }}
          command_timeout: 30s
          script: |
            # MCP 서버가 이미 실행 중이면 스킵
            if curl -sf http://localhost:3846/health > /dev/null 2>&1; then
              echo "MCP 서버 정상 실행 ���"
            else
              echo "MCP 서버 기동..."
              cd /opt/backtester/open-trading-api/backtester
              export MCP_HOST=0.0.0.0 MCP_PORT=3846
              nohup /home/ec2-user/.local/bin/uv run python -m kis_mcp.server > /tmp/mcp.log 2>&1 &
              sleep 3
              curl -sf http://localhost:3846/health && echo "MCP 기동 완료" || echo "WARNING: MCP 기동 실패"
            fi

      # nginx 설정 + docker-compose.prod.yml 을 EC2 로 SCP 전송 (단일 source of truth)
      - name: Copy nginx config to EC2
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ec2-user
          key: ${{ secrets.EC2_SSH_KEY }}
          source: "infra/nginx/app.conf,docker-compose.prod.yml,docker-compose.cloudwatch.yml"
          target: "/opt/stock-manager/_staging"
          strip_components: 0

      - name: Deploy to EC2
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ec2-user
          key: ${{ secrets.EC2_SSH_KEY }}
          envs: AWS_REGION,CLOUDWATCH_LOGS
          command_timeout: 5m
          script: |
            set -euo pipefail
            REGION="${AWS_REGION}"
            ECR_REPO="${{ steps.ecr-login.outputs.registry }}/stock-manager"
            IMAGE_TAG="${{ github.sha }}"
            # CloudWatch Logs 통합 (REQ-OPS-07): GitHub Actions vars/secrets 의 CLOUDWATCH_LOGS=true 시 활성
            # 사전 조건: terraform apply 로 aws_cloudwatch_log_group + IAM 정책 적용 완료
            CLOUDWATCH_LOGS="${CLOUDWATCH_LOGS:-false}"
            export ECR_REPO IMAGE_TAG AWS_REGION="$REGION"

            echo "[1/6] ECR 로그인..."
            aws ecr get-login-password --region "$REGION" | \
              docker login --username AWS --password-stdin "$ECR_REPO"

            # t3.small EBS 디스크 보호: 사전 prune.
            # currently-used 이미지(stock-manager, nginx)는 자동 보호됨.
            # 새 이미지 pull 단계에서 "no space left on device" 회피.
            echo "[1.5/6] 사전 디스크 정리..."
            docker image prune -af 2>/dev/null || true
            docker builder prune -af 2>/dev/null || true
            df -h / | tail -1

            echo "[2/6] 이미지 pull..."
            docker pull "$ECR_REPO:$IMAGE_TAG"

            echo "[3/6] SSM에서 환경변수 로드..."
            # docker compose .env parser는 값에 따옴표/백슬래시/줄바꿈 포함 시 거부.
            # 이전 패턴(`--output text` 후 `echo $name=$value`)은 raw 그대로 출력해
            # 시크릿 내부 `"`가 escape 안 된 채 다음 줄로 흘러 변수명에 혼입되던 결함.
            # 1) jq @json: 정상 시크릿은 큰따옴표 wrapping + 내부 \, ", newline 자동 escape
            # 2) excluded names: stock-manager가 사용하지 않는 멀티라인/외부 EC2 전용
            #    파라미터(예: kis_devlp_yaml은 backtester EC2가 user_data.sh에서 직접
            #    다운로드해 yaml 파일로 사용 — .env 1줄 형식과 본질적으로 비호환)
            command -v jq >/dev/null 2>&1 || sudo yum install -y jq
            EXCLUDED='kis_devlp_yaml'
            aws ssm get-parameters-by-path \
              --path "/stock-manager/prod/" \
              --with-decryption \
              --region "$REGION" \
              --output json | \
              jq -r --arg exc "$EXCLUDED" '
                ($exc | split(",")) as $excluded
                | .Parameters[]
                | (.Name | split("/") | last) as $name
                | select($excluded | index($name) | not)
                | "\($name)=\(.Value | @json)"
              ' > /opt/stock-manager/.env

            echo "[4/6] nginx 설정 + compose 파일 배치 (SCP staging → 운영 위치)..."
            cd /opt/stock-manager
            mkdir -p nginx certbot/conf certbot/www
            # SCP staging 디렉토리에서 파일 가져오기 (단일 source of truth: infra/nginx/app.conf)
            cp _staging/infra/nginx/app.conf nginx/app.conf
            cp _staging/docker-compose.prod.yml docker-compose.prod.yml
            cp _staging/docker-compose.cloudwatch.yml docker-compose.cloudwatch.yml
            rm -rf _staging

            # nginx 문법 검증
            # - --add-host=app:127.0.0.1: 단독 컨테이너에는 docker-compose 네트워크가 없어
            #   upstream "app" 을 resolve 못 함. 검증 목적의 dummy 매핑.
            # - certbot/conf 마운트: ssl_certificate 파일 부재 시 nginx -t 실패 방지.
            docker run --rm \
              --add-host=app:127.0.0.1 \
              -v /opt/stock-manager/nginx/app.conf:/etc/nginx/conf.d/default.conf:ro \
              -v /opt/stock-manager/certbot/conf:/etc/letsencrypt:ro \
              nginx:alpine nginx -t 2>&1 | tee /tmp/nginx-test.log || {
                echo "ERROR: nginx 설정 문법 오류. 배포 중단."
                cat /tmp/nginx-test.log
                exit 1
              }

            echo "[5/6] 컨테이너 시작..."
            # CloudWatch Logs 활성 시 cloudwatch override 추가 적용 (REQ-OPS-07)
            if [ "$CLOUDWATCH_LOGS" = "true" ]; then
              echo "  → CloudWatch Logs 활성: docker-compose.cloudwatch.yml override 적용"
              COMPOSE_FILES="-f docker-compose.prod.yml -f docker-compose.cloudwatch.yml"
            else
              COMPOSE_FILES="-f docker-compose.prod.yml"
            fi
            docker compose $COMPOSE_FILES up -d --remove-orphans

            # nginx 설정 파일은 volume mount 라 docker compose up 만으로 reload 되지 않음.
            # 새 설정을 적용하려면 명시적 reload 필요.
            if docker ps --format '{{.Names}}' | grep -q '^stock-nginx$'; then
              docker exec stock-nginx nginx -s reload && echo "nginx reload OK" || {
                echo "WARNING: nginx reload 실패, 컨테이너 재시작 시도"
                docker compose $COMPOSE_FILES restart nginx
              }
            fi

            echo "[6/6] 정리..."
            docker image prune -f

            echo "배포 완료. Health check:"
            sleep 5
            curl -sf http://localhost:8000/api/health && echo "OK" || echo "WARNING: Health check 실패"
