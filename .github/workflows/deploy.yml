name: Deploy

on:
  push:
    branches: [main]

env:
  AWS_REGION: ap-northeast-2

jobs:
  ci:
    name: CI
    uses: ./.github/workflows/ci.yml

  deploy:
    name: Build & Deploy
    runs-on: ubuntu-latest
    needs: ci
    permissions:
      id-token: write
      contents: read

    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to ECR
        id: ecr-login
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build & Push Docker image
        env:
          ECR_REGISTRY: ${{ steps.ecr-login.outputs.registry }}
          ECR_REPO: ${{ steps.ecr-login.outputs.registry }}/stock-manager
          IMAGE_TAG: ${{ github.sha }}
        run: |
          docker build -t $ECR_REPO:$IMAGE_TAG -t $ECR_REPO:latest .
          docker push $ECR_REPO:$IMAGE_TAG
          docker push $ECR_REPO:latest

      - name: Ensure Backtester MCP
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.BACKTESTER_HOST }}
          username: ec2-user
          key: ${{ secrets.EC2_SSH_KEY }}
          command_timeout: 30s
          script: |
            # MCP 서버가 이미 실행 중이면 스킵
            if curl -sf http://localhost:3846/health > /dev/null 2>&1; then
              echo "MCP 서버 정상 실행 ���"
            else
              echo "MCP 서버 기동..."
              cd /opt/backtester/open-trading-api/backtester
              export MCP_HOST=0.0.0.0 MCP_PORT=3846
              nohup /home/ec2-user/.local/bin/uv run python -m kis_mcp.server > /tmp/mcp.log 2>&1 &
              sleep 3
              curl -sf http://localhost:3846/health && echo "MCP 기동 완료" || echo "WARNING: MCP 기동 실패"
            fi

      - name: Deploy to EC2
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ec2-user
          key: ${{ secrets.EC2_SSH_KEY }}
          envs: AWS_REGION
          command_timeout: 5m
          script: |
            set -euo pipefail
            REGION="${AWS_REGION}"
            ECR_REPO="${{ steps.ecr-login.outputs.registry }}/stock-manager"
            IMAGE_TAG="${{ github.sha }}"

            echo "[1/6] ECR 로그인..."
            aws ecr get-login-password --region "$REGION" | \
              docker login --username AWS --password-stdin "$ECR_REPO"

            echo "[2/6] 이미지 pull..."
            docker pull "$ECR_REPO:$IMAGE_TAG"

            echo "[3/6] SSM에서 환경변수 로드..."
            aws ssm get-parameters-by-path \
              --path "/stock-manager/prod/" \
              --with-decryption \
              --region "$REGION" \
              --query "Parameters[*].[Name,Value]" \
              --output text | while IFS=$'\t' read -r name value; do
                echo "$(basename "$name")=$value"
            done > /opt/stock-manager/.env

            echo "[4/6] nginx 설정 배포..."
            cd /opt/stock-manager
            mkdir -p nginx certbot/conf certbot/www

            cat > nginx/app.conf << 'NGINX_EOF'
            server {
                listen 80;
                server_name dkstock.cloud www.dkstock.cloud;
                location /.well-known/acme-challenge/ {
                    root /var/www/certbot;
                }
                location / {
                    return 301 https://$host$request_uri;
                }
            }
            server {
                listen 443 ssl;
                server_name dkstock.cloud www.dkstock.cloud;
                ssl_certificate /etc/letsencrypt/live/dkstock.cloud/fullchain.pem;
                ssl_certificate_key /etc/letsencrypt/live/dkstock.cloud/privkey.pem;
                ssl_protocols TLSv1.2 TLSv1.3;
                ssl_prefer_server_ciphers on;
                location / {
                    proxy_pass http://app:8000;
                    proxy_set_header Host $host;
                    proxy_set_header X-Real-IP $remote_addr;
                    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
                    proxy_set_header X-Forwarded-Proto $scheme;
                    proxy_http_version 1.1;
                    proxy_set_header Upgrade $http_upgrade;
                    proxy_set_header Connection "upgrade";
                    proxy_read_timeout 86400;
                }
            }
            NGINX_EOF

            echo "[5/6] 컨테이너 시작..."

            cat > docker-compose.prod.yml << COMPOSE_EOF
            services:
              app:
                image: ${ECR_REPO}:${IMAGE_TAG}
                container_name: stock-manager
                restart: unless-stopped
                env_file: [.env]
                expose: ["8000"]
                volumes: [watchlist-data:/home/app/stock-watchlist]
                healthcheck:
                  test: ["CMD-SHELL", "curl -f http://localhost:8000/api/health || exit 1"]
                  interval: 30s
                  timeout: 5s
                  retries: 3
                logging:
                  driver: json-file
                  options:
                    max-size: "10m"
                    max-file: "3"
              nginx:
                image: nginx:alpine
                container_name: stock-nginx
                restart: unless-stopped
                ports: ["80:80", "443:443"]
                volumes:
                  - ./nginx/app.conf:/etc/nginx/conf.d/default.conf:ro
                  - ./certbot/www:/var/www/certbot:ro
                  - ./certbot/conf:/etc/letsencrypt:ro
                depends_on: [app]
              certbot:
                image: certbot/certbot
                container_name: stock-certbot
                volumes:
                  - ./certbot/www:/var/www/certbot
                  - ./certbot/conf:/etc/letsencrypt
                entrypoint: "/bin/sh -c 'trap exit TERM; while :; do certbot renew; sleep 12h & wait \$\${!}; done;'"
            volumes:
              watchlist-data:
            COMPOSE_EOF

            docker compose -f docker-compose.prod.yml up -d --remove-orphans

            echo "[6/6] 정리..."
            docker image prune -f

            echo "배포 완료. Health check:"
            sleep 5
            curl -sf http://localhost:8000/api/health && echo "OK" || echo "WARNING: Health check 실패"
