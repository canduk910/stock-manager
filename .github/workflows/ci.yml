name: CI

on:
  push:
    branches: ["*"]
  pull_request:
    branches: [main]
  workflow_call:

# 동일 ref의 이전 실행 자동 취소 — hang run 누적 방지.
# group에 github.workflow 포함: CI(standalone)와 Deploy의 reusable CI가 서로를 취소하지 않음.
concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: Backend Tests
    runs-on: ubuntu-latest
    # 외부 네트워크 hang 대비 job 레벨 backstop (pytest-timeout이 1차 가드).
    timeout-minutes: 15

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: stocktest
          POSTGRES_PASSWORD: stocktest
          POSTGRES_DB: stocktest
        ports:
          - 5433:5432
        options: >-
          --health-cmd "pg_isready -U stocktest"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run tests
        env:
          TESTING: "1"
          TEST_DATABASE_URL: postgresql://stocktest:stocktest@localhost:5433/stocktest
        run: pytest tests/ -v -m "not slow" --tb=short

  build-frontend:
    name: Frontend Build
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install & Build
        working-directory: frontend
        run: |
          npm ci
          npm run build

  docker-build:
    name: Docker Build
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    needs: [test, build-frontend]
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4

      - name: Build Docker image
        run: docker build -t stock-manager:ci-test .
