[pytest]
testpaths = tests
python_files = test_*.py
python_functions = test_*
# 개별 테스트 hang 가드 (pytest-timeout). 외부 네트워크 mock 누락 테스트가
# socket에서 무한 대기 시 120초 후 해당 테스트만 실패시켜 CI 무한 hang 방지.
# signal 방식(기본, Unix)은 blocking syscall 중에도 인터럽트 가능.
timeout = 120
markers =
    slow: 외부 API 호출이 필요한 느린 테스트
    live: KIS_LIVE_TEST=1 환경변수가 설정된 경우에만 실행되는 실 키 통합 테스트 (CI에서 자동 skip)