[pytest]
testpaths = tests
python_files = test_*.py
python_functions = test_*
# 개별 테스트 hang 가드 (pytest-timeout). 외부 네트워크 mock 누락 테스트가
# socket에서 무한 대기 시 120초 후 차단해 CI 무한 hang 방지.
# timeout_method=thread: 기본 signal 방식은 메인 스레드만 인터럽트하는데, 본
# 코드베이스의 API 테스트는 FastAPI TestClient가 엔드포인트를 worker thread에서
# 실행하므로 worker가 소켓에서 블록되면 signal로 못 죽인다(2026-06-20 /summary
# FRED hang이 120s 스택만 찍고 job 15분 wall까지 감). thread 방식은 별도 타이머
# 스레드가 만료 시 프로세스를 강제 종료해 thread-hang도 120s에 확실히 차단한다.
timeout = 120
timeout_method = thread
markers =
    slow: 외부 API 호출이 필요한 느린 테스트
    live: KIS_LIVE_TEST=1 환경변수가 설정된 경우에만 실행되는 실 키 통합 테스트 (CI에서 자동 skip)