services:
  test-db:
    image: postgres:16
    container_name: stock-manager-test-db
    environment:
      POSTGRES_USER: stocktest
      POSTGRES_PASSWORD: stocktest
      POSTGRES_DB: stocktest
    ports:
      - "5433:5432"
    tmpfs:
      - /var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U stocktest"]
      interval: 5s
      timeout: 3s
      retries: 5
