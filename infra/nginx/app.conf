# HTTP -> HTTPS redirect + ACME challenge
server {
    listen 80;
    server_name dkstock.cloud www.dkstock.cloud;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# HTTPS reverse proxy
server {
    listen 443 ssl;
    server_name dkstock.cloud www.dkstock.cloud;

    ssl_certificate /etc/letsencrypt/live/dkstock.cloud/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/dkstock.cloud/privkey.pem;

    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers on;
    server_tokens off;

    # ── 보안 헤더 (HSTS는 HTTPS 컨텍스트 한정) ──
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;
    add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline'; img-src 'self' data: https:; connect-src 'self' wss: ws:; font-src 'self';" always;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

    # 공통 프록시 헤더 (HTTP/WS 양쪽에서 사용)
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_hide_header Server;

    # ── INF-3 gzip 압축 (HTTP 컨텍스트 한정 — WS는 Upgrade 헤더로 자동 제외) ──
    # JSON 응답 70~80% 압축, 정적 자산도 압축. WebSocket 응답은 영향 없음.
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 5;
    gzip_min_length 1024;
    gzip_types
        application/json
        application/javascript
        application/x-javascript
        text/javascript
        text/css
        text/plain
        text/xml
        application/xml
        application/xml+rss
        image/svg+xml;

    # ── WebSocket 엔드포인트 ──
    # /ws/quote/{symbol}, /ws/execution-notice (routers/quote.py)
    # /ws/market-board (routers/market_board.py)
    # 1시간 idle timeout (KIS 실시간 스트림 long-lived)
    location ^~ /ws/ {
        proxy_pass http://app:8000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
    }

    # ── HTTP API ──
    # AI 자문 30~60초 + 여유 → 90s. 백엔드 hang이 nginx 워커 무한 점유 방지.
    location /api/ {
        proxy_pass http://app:8000;
        proxy_http_version 1.1;
        proxy_read_timeout 90s;
        proxy_send_timeout 90s;
    }

    # ── INF-3 정적 자산 캐시 (Vite fingerprint hash 사용 → immutable 안전) ──
    # /assets/index-xxxxxxx.js, /assets/index-xxxxxxx.css 등
    location ^~ /assets/ {
        proxy_pass http://app:8000;
        proxy_http_version 1.1;
        proxy_read_timeout 60s;
        proxy_send_timeout 60s;
        # 1년 + immutable. 빌드마다 hash가 바뀌므로 stale 위험 없음.
        add_header Cache-Control "public, max-age=31536000, immutable" always;
        # 보안 헤더는 server-level add_header가 location-level과 함께 적용되지 않으므로
        # 핵심 보안 헤더 재선언 (nginx add_header inheritance 제약).
        add_header X-Content-Type-Options "nosniff" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
        add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    }

    # ── 정적 파일 + SPA 라우팅 ──
    # FastAPI가 frontend/dist 를 정적 서빙. 기본 60s 충분.
    # index.html은 main.py에서 Cache-Control: no-cache 헤더를 이미 설정 (배포 즉시 갱신).
    location / {
        proxy_pass http://app:8000;
        proxy_http_version 1.1;
        proxy_read_timeout 60s;
        proxy_send_timeout 60s;
    }
}
