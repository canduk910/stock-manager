# HTTP -> HTTPS redirect + ACME challenge
server {
    listen 80;
    server_name dkstock.cloud www.dkstock.cloud;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# HTTPS reverse proxy
server {
    listen 443 ssl;
    server_name dkstock.cloud www.dkstock.cloud;

    ssl_certificate /etc/letsencrypt/live/dkstock.cloud/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/dkstock.cloud/privkey.pem;

    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers on;

    # FastAPI + WebSocket proxy
    location / {
        proxy_pass http://app:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # WebSocket (/ws/quote, /ws/execution-notice)
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_read_timeout 86400;
    }
}
